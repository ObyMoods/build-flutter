# .github/workflows/build.yml
name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Direct download URL for ZIP file'
        required: true
        type: string
      tag:
        description: 'Build tag identifier'
        required: true
        type: string
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download project ZIP
        run: |
          echo "📥 Downloading project from: ${{ inputs.zip_url }}"
          echo "🔗 URL: ${{ inputs.zip_url }}"
          
          # Download dengan follow redirect
          curl -L -o project.zip "${{ inputs.zip_url }}"
          
          # Cek file
          echo "📦 File size: $(du -h project.zip | cut -f1)"
          echo "🔍 File type:"
          file project.zip
          
          # Cek apakah file ZIP valid
          if ! unzip -t project.zip 2>/dev/null; then
            echo "❌ File is not a valid ZIP archive!"
            echo "📄 First 100 bytes of file:"
            xxd -l 100 project.zip || head -c 100 project.zip | xxd
            exit 1
          fi
          
          unzip -q project.zip -d project
          echo "📂 Project contents:"
          ls -la project/

      - name: Validate Flutter project
        run: |
          if [ ! -f project/pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            echo "📂 Files in project root:"
            ls -la project/
            echo "📂 All files in project:"
            find project -type f | head -30
            exit 1
          fi
          echo "✅ pubspec.yaml found"
          
          if [ ! -d project/lib ]; then
            echo "⚠️ lib folder not found, but continuing..."
          fi

      - name: Flutter clean & pub get
        working-directory: ./project
        run: |
          flutter clean
          flutter pub get
          echo "✅ Dependencies installed"

      - name: Flutter build APK
        working-directory: ./project
        run: |
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            echo "🔨 Building DEBUG APK..."
            flutter build apk --debug
          else
            echo "🔨 Building RELEASE APK..."
            flutter build apk --release
          fi

      - name: Find and verify APK
        id: find_apk
        run: |
          echo "🔍 Searching for APK files..."
          find project/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            APK_PATH=$(find project/build -name "*.apk" -path "*/debug/*" 2>/dev/null | head -1)
          else
            APK_PATH=$(find project/build -name "*.apk" -path "*/release/*" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find project/build -name "*.apk" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            echo "📂 Build directory contents:"
            find project/build -type f 2>/dev/null || echo "Build directory not found"
            exit 1
          fi
          
          echo "✅ Found APK: $APK_PATH"
          echo "📏 APK size: $(du -h $APK_PATH | cut -f1)"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: ${{ steps.find_apk.outputs.APK_PATH }}
          retention-days: 7

      - name: Upload build logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: project/build/
          retention-days: 3
