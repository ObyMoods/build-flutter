name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Direct download URL for ZIP file from bot'
        required: true
        type: string
      tag:
        description: 'Build tag identifier from bot'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download project from bot
        run: |
          echo "📥 Downloading project from: ${{ inputs.zip_url }}"
          curl -L --retry 5 --retry-delay 3 -o project.zip "${{ inputs.zip_url }}"
          
          if [ ! -f project.zip ]; then
            echo "❌ Failed to download project.zip"
            exit 1
          fi
          
          unzip -q project.zip -d project
          rm -f project.zip
          
          echo "✅ Extraction successful!"
          ls -la project/

      - name: Fix SDK version
        working-directory: ./project
        run: |
          echo "🔧 Fixing SDK version in pubspec.yaml"
          sed -i 's/sdk: \^3\.8\.1/sdk: ">=3.0.0 <4.0.0"/g' pubspec.yaml
          sed -i 's/sdk: ">=3\.8\.1 <4\.0\.0"/sdk: ">=3.0.0 <4.0.0"/g' pubspec.yaml
          echo "✅ SDK version fixed!"
          grep -E "^sdk:" pubspec.yaml

      - name: Get dependencies
        working-directory: ./project
        run: flutter pub get

      - name: Build APK
        working-directory: ./project
        run: |
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: project/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
