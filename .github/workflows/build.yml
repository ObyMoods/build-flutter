# .github/workflows/build.yml
name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Direct download URL for ZIP file from bot'
        required: true
        type: string
      tag:
        description: 'Build tag identifier from bot'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 🔥 Gunakan Flutter 3.22.0 dengan Dart 3.4.0
          # Kompatibel dengan font_awesome_flutter 10.12.0
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download project from bot
        run: |
          echo "========================================="
          echo "📥 DOWNLOADING PROJECT FROM BOT"
          echo "========================================="
          echo "URL: ${{ inputs.zip_url }}"
          echo "Tag: ${{ inputs.tag }}"
          echo "Type: ${{ inputs.build_type }}"
          
          curl -L --retry 5 --retry-delay 3 --max-time 120 -o project.zip "${{ inputs.zip_url }}"
          
          if [ ! -f project.zip ]; then
            echo "❌ Failed to download project.zip"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s project.zip 2>/dev/null || stat -f%z project.zip 2>/dev/null || echo "0")
          echo "📦 File size: $FILE_SIZE bytes ($(($FILE_SIZE/1024)) KB)"
          
          if [ $FILE_SIZE -lt 100 ]; then
            echo "❌ File too small!"
            cat project.zip
            exit 1
          fi
          
          if ! unzip -t project.zip 2>/dev/null; then
            echo "❌ ZIP file is corrupted!"
            exit 1
          fi
          
          unzip -q project.zip -d project
          rm -f project.zip
          
          echo "✅ Extraction successful!"
          ls -la project/

      - name: Validate Flutter project
        run: |
          if [ ! -f project/pubspec.yaml ]; then
            echo "❌ pubspec.yaml not found!"
            ls -la project/
            exit 1
          fi
          echo "✅ pubspec.yaml found"

      - name: Check Flutter & Dart version
        run: |
          echo "========================================="
          echo "📋 FLUTTER VERSION"
          echo "========================================="
          flutter --version
          echo ""
          dart --version

      - name: Get dependencies
        working-directory: ./project
        run: |
          echo "========================================="
          echo "📦 GETTING DEPENDENCIES"
          echo "========================================="
          
          flutter clean || true
          flutter pub get
          
          echo "✅ Dependencies installed"

      - name: Build APK
        working-directory: ./project
        run: |
          echo "========================================="
          echo "🔨 BUILDING FLUTTER APK"
          echo "========================================="
          
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            echo "Mode: DEBUG"
            flutter build apk --debug
          else
            echo "Mode: RELEASE"
            flutter build apk --release
          fi
          
          echo "✅ Build completed!"

      - name: Find APK
        id: find_apk
        run: |
          echo "========================================="
          echo "🔍 SEARCHING FOR APK"
          echo "========================================="
          
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            APK_PATH=$(find project/build -name "*.apk" -path "*/debug/*" 2>/dev/null | head -1)
          else
            APK_PATH=$(find project/build -name "*.apk" -path "*/release/*" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find project/build -name "*.apk" 2>/dev/null | head -1)
          fi
          
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found!"
            echo "📂 Build directory contents:"
            find project/build -type f 2>/dev/null || echo "Build directory not found"
            exit 1
          fi
          
          echo "✅ Found APK: $APK_PATH"
          echo "📏 APK size: $(du -h $APK_PATH | cut -f1)"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.build_type }}
          path: ${{ steps.find_apk.outputs.APK_PATH }}
          retention-days: 7

      - name: Upload build logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: project/
          retention-days: 3
